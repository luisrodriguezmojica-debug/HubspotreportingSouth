<script>
// ── Count-up ─────────────────────────────────────────────────────
function cu(el, target, ms) {
  el.textContent = '0';
  var t0 = performance.now();
  function tick(t) {
    var p = Math.min((t - t0) / ms, 1);
    var e = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(e * target).toLocaleString();
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ── Animate a section: bars, fades, table rows, KPIs ─────────────
function animateSection(sectionEl) {
  // Fade-in cards + kpis
  sectionEl.querySelectorAll('.kpi, .card').forEach(function(el, i) {
    var d = parseInt(el.dataset.d || 0);
    setTimeout(function() {
      el.classList.add('in');
      // Bar fills
      setTimeout(function() {
        el.querySelectorAll('.bfill[data-w], .sbfill[data-w]').forEach(function(b) {
          b.style.width = b.dataset.w + '%';
        });
      }, 120);
    }, d);
  });
  // Table rows stagger
  sectionEl.querySelectorAll('tbody tr').forEach(function(r, i) {
    setTimeout(function() { r.classList.add('in'); }, 80 + i * 45);
  });
  // Alert
  var al = sectionEl.querySelector('.alert');
  if (al) setTimeout(function() { al.classList.add('in'); }, 300);
  // KPI counters
  var ko = sectionEl.querySelector('#k-open');
  var kc = sectionEl.querySelector('#k-closed');
  var ku = sectionEl.querySelector('#k-unassigned');
  if (ko) cu(ko, 64, 900);
  if (kc) cu(kc, 5876, 1200);
  if (ku) cu(ku, 2, 600);
}

// ── Nav switch ───────────────────────────────────────────────────
var animated = {};
function show(id) {
  document.querySelectorAll('.page-section').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(n) { n.classList.remove('active'); });
  var sec = document.getElementById('sec-' + id);
  var btn = document.getElementById('nav-' + id);
  if (sec) sec.classList.add('active');
  if (btn) btn.classList.add('active');
  if (!animated[id]) {
    animated[id] = true;
    if (sec) animateSection(sec);
  }
}

// ── Alert observer (footer alert outside sections) ───────────────
var alertEl = document.getElementById('alert-email');
if (alertEl) {
  var aobs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('in'); aobs.unobserve(e.target); }
    });
  }, { threshold: 0.4 });
  aobs.observe(alertEl);
}

// ── Auto-animate the initial active section on load ──────────────
window.addEventListener('DOMContentLoaded', function() {
  var active = document.querySelector('.page-section.active');
  if (active) {
    var id = active.id.replace('sec-', '');
    animated[id] = true;
    animateSection(active);
  }
});
</script>
</body>
</html>
