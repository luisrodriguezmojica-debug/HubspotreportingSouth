<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>South CS · Operations Dashboard · July 2026 · PM-International</title>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --pm:#004b8d; --pm-dk:#003a6e; --pm-lt:#cae3f6; --pm-llt:#eaf4fc;
  --silver:#a7a9ac; --silver-lt:#e8e9ea;
  --white:#fff; --bg:#f4f6f9;
  --txt:#1a1a2e; --mid:#52514e; --muted:#888780;
  --border:rgba(0,75,141,.1); --border-s:rgba(0,75,141,.2);
  --green:#1a7a52; --green-lt:#e2f5ec; --green-dk:#0d4a30;
  --amber:#b7740a; --amber-lt:#fef3dc; --amber-dk:#6b4206;
  --red:#c0392b; --red-lt:#fcecea; --red-dk:#7f1a1a;
  --violet:#4a3aa7; --violet-lt:#eeedfe; --violet-dk:#2e2470;
  --teal:#0e7c72; --teal-lt:#e0f4f2;
  --r:8px; --shadow:0 1px 4px rgba(0,75,141,.08);
  --font:'Ubuntu',system-ui,sans-serif;
  --side:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--txt);display:flex;min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* SIDEBAR */
.sidebar{width:var(--side);min-height:100vh;background:var(--pm);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sb-logo{padding:16px 16px 14px;border-bottom:1px solid rgba(255,255,255,.12);background:#fff}
.sb-logo img{height:52px;display:block;object-fit:contain}
.sb-team{padding:12px 16px 10px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-team-name{font-size:13px;font-weight:500;color:#fff}
.sb-team-sub{font-size:10px;color:rgba(202,227,246,.6);margin-top:2px;font-weight:300}
.nav-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(202,227,246,.4);padding:14px 16px 5px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 16px;color:rgba(255,255,255,.6);font-size:12px;font-weight:400;cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent;transition:all .15s;font-family:var(--font)}
.nav-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-btn.active{background:rgba(202,227,246,.15);color:#fff;font-weight:500;border-left-color:var(--pm-lt)}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nav-div{height:1px;background:rgba(255,255,255,.1);margin:6px 16px}
.sb-source{margin-top:auto;padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
.sb-source p{font-size:10px;color:rgba(255,255,255,.28);line-height:1.7;font-weight:300}

/* MAIN */
.main{margin-left:var(--side);flex:1;min-width:0}
.topbar{background:var(--white);border-bottom:2px solid var(--pm-lt);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.tb-title{font-size:15px;font-weight:500;color:var(--pm)}
.tb-sub{font-size:11px;color:var(--muted);margin-top:2px}
.tb-right{display:flex;align-items:center;gap:10px}
.sys-badge{font-size:10px;font-weight:500;padding:4px 10px;border-radius:12px;white-space:nowrap}
.badge-hs{background:var(--pm-lt);color:var(--pm)}
.badge-zd{background:var(--teal-lt);color:var(--teal)}
.print-btn{font-size:11px;color:var(--muted);background:none;border:1px solid var(--border-s);border-radius:var(--r);padding:5px 12px;cursor:pointer;font-family:var(--font);transition:background .15s}
.print-btn:hover{background:var(--pm-llt)}

/* PLATFORM BANNER */
.platform-note{margin:18px 28px 0;background:linear-gradient(135deg,var(--pm-lt) 0%,var(--teal-lt) 100%);border:1px solid rgba(0,75,141,.15);border-radius:var(--r);padding:12px 16px;display:flex;align-items:flex-start;gap:12px}
.pn-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.pn-text{font-size:12px;color:var(--pm);line-height:1.6}
.pn-text strong{font-weight:600;display:block;margin-bottom:2px}
.platform-chips{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.chip{font-size:10px;font-weight:500;padding:3px 10px;border-radius:10px;display:flex;align-items:center;gap:5px}
.chip-zd{background:var(--teal-lt);color:var(--teal);border:1px solid rgba(14,124,114,.2)}
.chip-hs{background:var(--pm-lt);color:var(--pm);border:1px solid rgba(0,75,141,.2)}

/* SECTIONS */
.section{padding:22px 28px 0}.section:last-child{padding-bottom:36px}
.sec{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-title{font-size:10px;font-weight:700;color:var(--pm);text-transform:uppercase;letter-spacing:.09em;white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--pm-lt)}
.sec-meta{font-size:10px;color:var(--muted);white-space:nowrap}

/* KPI GRID */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px 12px;position:relative;overflow:hidden;box-shadow:var(--shadow);opacity:0;transform:translateY(12px);transition:opacity .4s ease,transform .4s ease}
.kpi.in{opacity:1;transform:translateY(0)}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:3px}
.kpi-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.kpi-val{font-size:30px;font-weight:500;line-height:1;margin-bottom:5px;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:11px;color:var(--muted)}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g31{display:grid;grid-template-columns:3fr 1fr;gap:14px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow);opacity:0;transform:translateY(10px);transition:opacity .4s ease,transform .4s ease}
.card.in{opacity:1;transform:translateY(0)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:500;color:var(--pm)}
.card-meta{font-size:10px;color:var(--muted)}

/* OWNER ROWS */
.orow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--pm-lt)}
.orow:last-child{border-bottom:none}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.ometa{flex:1;min-width:0}
.oname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.orole{font-size:10px;color:var(--muted)}
.btrack{flex:1;min-width:50px;background:var(--pm-lt);border-radius:3px;height:5px;overflow:hidden}
.bfill{height:100%;border-radius:3px;width:0;transition:width .9s cubic-bezier(.16,1,.3,1)}
.ocount{font-size:13px;font-weight:500;min-width:20px;text-align:right}

/* STAGE ROWS */
.srow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--pm-lt)}
.srow:last-child{border-bottom:none}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sname{font-size:13px;flex:1}
.sbtrack{width:70px;background:var(--pm-lt);border-radius:3px;height:5px;overflow:hidden;flex-shrink:0}
.sbfill{height:100%;border-radius:3px;width:0;transition:width .9s cubic-bezier(.16,1,.3,1)}
.scount{font-size:13px;font-weight:500;min-width:20px;text-align:right}
.spct{font-size:10px;color:var(--muted);min-width:28px;text-align:right}

/* AGE BUCKETS */
.age-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:4px}
.age-cell{text-align:center;padding:10px 6px;border-radius:var(--r);background:var(--pm-llt);border:1px solid var(--pm-lt)}
.age-cell.warn{background:var(--amber-lt);border-color:rgba(183,116,10,.2)}
.age-cell.danger{background:var(--red-lt);border-color:rgba(192,57,43,.2)}
.age-num{font-size:22px;font-weight:500;line-height:1;margin-bottom:3px}
.age-lbl{font-size:10px;color:var(--muted);font-weight:400}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:9px;font-weight:700;color:var(--white);text-transform:uppercase;letter-spacing:.07em;text-align:left;padding:8px 10px;background:var(--pm);white-space:nowrap}
th:first-child{border-radius:var(--r) 0 0 0} th:last-child{border-radius:0 var(--r) 0 0}
td{padding:8px 10px;border-bottom:1px solid var(--pm-lt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:rgba(202,227,246,.12)}
tr:hover td{background:var(--pm-lt);transition:background .1s}
tbody tr{opacity:0;transform:translateX(-6px);transition:opacity .3s ease,transform .3s ease}
tbody tr.in{opacity:1;transform:translateX(0)}
.total-row td{background:var(--pm)!important;color:#fff;font-weight:500;font-size:11px}
.total-row:hover td{background:var(--pm-dk)!important}
.subj{max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}

/* BADGES */
.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:8px;white-space:nowrap;display:inline-block}
.b-new{background:var(--red-lt);color:var(--red)}
.b-ip{background:var(--violet-lt);color:var(--violet-dk)}
.b-wc{background:var(--amber-lt);color:var(--amber-dk)}
.b-wu{background:var(--pm-lt);color:var(--pm)}
.b-gray{background:var(--silver-lt);color:var(--muted)}
.b-green{background:var(--green-lt);color:var(--green-dk)}
.b-teal{background:var(--teal-lt);color:var(--teal)}
.age-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;display:inline-block;white-space:nowrap}
.ab-ok{background:var(--green-lt);color:var(--green-dk)}
.ab-warn{background:var(--amber-lt);color:var(--amber-dk)}
.ab-danger{background:var(--red-lt);color:var(--red)}

/* OCELL */
.ocell{display:flex;align-items:center;gap:6px}
.mav{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;flex-shrink:0}

/* ZENDESK SECTION */
.zd-banner{background:linear-gradient(135deg,var(--pm) 0%,#0e7c72 100%);border-radius:var(--r);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.zd-banner-left .title{font-size:14px;font-weight:500;color:#fff}
.zd-banner-left .sub{font-size:11px;color:rgba(202,227,246,.75);margin-top:2px}
.zd-banner-right{font-size:11px;color:rgba(202,227,246,.65);text-align:right;font-weight:300}
.zd-stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.zd-stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;text-align:center;box-shadow:var(--shadow)}
.zd-stat-val{font-size:22px;font-weight:500;color:var(--teal);line-height:1;margin-bottom:3px}
.zd-stat-lbl{font-size:10px;color:var(--muted)}

/* CALLOUTS */
.insight{background:var(--pm-lt);border-left:3px solid var(--pm);padding:11px 14px;font-size:12px;color:var(--pm);line-height:1.6;margin-top:12px;border-radius:0 var(--r) var(--r) 0}
.warn-box{background:var(--amber-lt);border-left:3px solid var(--amber);padding:10px 14px;font-size:12px;color:var(--amber-dk);line-height:1.6;margin-top:10px;border-radius:0 var(--r) var(--r) 0}
.note{background:var(--silver-lt);border-left:3px solid var(--silver);padding:10px 14px;font-size:11px;color:var(--mid);line-height:1.6;margin-top:10px;border-radius:0 var(--r) var(--r) 0}
.note-strip{margin-top:10px;padding-top:10px;border-top:1px solid var(--pm-lt);font-size:11px;color:var(--muted);line-height:1.6}

/* ALERT */
.alert{display:flex;align-items:flex-start;gap:10px;background:var(--amber-lt);border:1px solid rgba(183,116,10,.2);border-left:3px solid var(--amber);border-radius:var(--r);padding:11px 15px;margin-top:16px;font-size:12px;color:var(--amber-dk);opacity:0;transform:translateY(5px);transition:opacity .4s ease .2s,transform .4s ease .2s}
.alert.in{opacity:1;transform:translateY(0)}

/* PAGE SECTIONS */
.page-section{display:none}.page-section.active{display:block}

/* FOOTER */
.footer{padding:16px 28px;border-top:2px solid var(--pm-lt);font-size:11px;color:var(--muted);display:flex;align-items:center;justify-content:space-between;background:var(--white);margin-top:28px}
.footer-brand{font-size:11px;color:var(--pm);font-weight:500}

/* SVG DONUT */
.donut-wrap{display:flex;align-items:center;gap:18px}
.donut-svg{position:relative;width:130px;height:130px;flex-shrink:0}
.donut-svg svg{width:100%;height:100%}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.donut-num{font-size:18px;font-weight:500;color:var(--pm);line-height:1}
.donut-lbl{font-size:9px;color:var(--muted);margin-top:2px}
.leg-item{display:flex;align-items:center;gap:7px;padding:4px 0}
.leg-sw{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.leg-lbl{font-size:11px;color:var(--mid);flex:1}
.leg-val{font-size:11px;font-weight:500}

@media(max-width:860px){:root{--side:0}.sidebar{display:none}.kpi-row,.g2,.g3,.g31,.g21,.age-grid,.zd-stat-row{grid-template-columns:1fr}}
@media print{.sidebar{display:none}.main{margin-left:0}.topbar{position:static}.kpi,.card{opacity:1!important;transform:none!important;break-inside:avoid} tbody tr{opacity:1!important;transform:none!important} th{background:var(--pm)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-logo">
    <img src="assets/pm-logo.png" alt="PM-International · Simple. Successful.">
  </div>
  <div class="sb-team">
    <div class="sb-team-name">South CS Team</div>
    <div class="sb-team-sub">Operations Dashboard &middot; July 2026</div>
  </div>

  <div class="nav-label">HubSpot &middot; Live</div>
  <button class="nav-btn active" onclick="show('overview')" id="nav-overview"><div class="nav-dot" style="background:#cae3f6"></div>Overview</button>
  <button class="nav-btn" onclick="show('tickets')" id="nav-tickets"><div class="nav-dot" style="background:#cae3f6"></div>Ticket Breakdown</button>
  <button class="nav-btn" onclick="show('owners')" id="nav-owners"><div class="nav-dot" style="background:#cae3f6"></div>By Agent</button>
  <button class="nav-btn" onclick="show('flagged')" id="nav-flagged"><div class="nav-dot" style="background:#e24b4a"></div>Flagged Tickets</button>

  <div class="nav-div"></div>
  <div class="nav-label">Zendesk &middot; Apr–May 2026</div>
  <button class="nav-btn" onclick="show('zendesk')" id="nav-zendesk"><div class="nav-dot" style="background:#4ecfc5"></div>Zendesk Archive</button>
<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div>
      <div class="tb-title">South CS Operations Dashboard</div>
      <div class="tb-sub">PM-International &middot; HubSpot (Jun–Jul 2026) + Zendesk archive (Apr–May 2026)</div>
    </div>
    <div class="tb-right">
      <span class="sys-badge badge-hs">HubSpot Live</span>
      <span class="sys-badge badge-zd">Zendesk Archive</span>
      <button class="print-btn" onclick="window.print()">Print / PDF</button>
    </div>
  </div>

  <!-- PLATFORM TRANSITION BANNER -->
  <div class="platform-note">
    <span class="pn-icon">🔄</span>
    <div class="pn-text">
      <strong>Platform Migration Note</strong>
      The South CS team operated on <strong>Zendesk</strong> during <strong>April &amp; May 2026</strong> and migrated to <strong>HubSpot</strong> in <strong>June 2026</strong>. This dashboard reflects both systems. HubSpot ticket data is live; Zendesk data is from the final export. Metrics are <em>not</em> directly comparable between platforms due to different ticket definitions and workflows.
      <div class="platform-chips">
        <span class="chip chip-zd">Zendesk · Apr 2026</span>
        <span class="chip chip-zd">Zendesk · May 2026</span>
        <span class="chip chip-hs">HubSpot · Jun 2026</span>
        <span class="chip chip-hs">HubSpot · Jul 2026 (current)</span>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- OVERVIEW -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div id="sec-overview" class="page-section active">
    <div class="section">
      <div class="sec"><span class="sec-title">HubSpot · Live Snapshot &middot; Jul 3 2026</span><div class="sec-line"></div></div>
      <div class="kpi-row">
        <div class="kpi" data-d="0">
          <div class="kpi-bar" style="background:var(--pm)"></div>
          <div class="kpi-label">Open tickets</div>
          <div class="kpi-val" style="color:var(--pm)" id="k-open">0</div>
          <div class="kpi-sub">HubSpot · active</div>
        </div>
        <div class="kpi" data-d="80">
          <div class="kpi-bar" style="background:var(--green)"></div>
          <div class="kpi-label">Closed tickets</div>
          <div class="kpi-val" style="color:var(--green)" id="k-closed">0</div>
          <div class="kpi-sub">have a close date</div>
        </div>
        <div class="kpi" data-d="160">
          <div class="kpi-bar" style="background:var(--amber)"></div>
          <div class="kpi-label">Unassigned open</div>
          <div class="kpi-val" style="color:var(--amber)" id="k-unassigned">0</div>
          <div class="kpi-sub">no owner set</div>
        </div>
        <div class="kpi" data-d="240">
          <div class="kpi-bar" style="background:var(--red)"></div>
          <div class="kpi-label">Oldest open</div>
          <div class="kpi-val" style="color:var(--red)">52d</div>
          <div class="kpi-sub">open since May 12</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec"><span class="sec-title">Volume &amp; Resolution</span><div class="sec-line"></div><span class="sec-meta">5,940 all-time in HubSpot</span></div>
      <div class="g31">
        <div class="card" data-d="0">
          <div class="card-head"><span class="card-title">Open vs. closed &mdash; all time</span><span class="card-meta">HubSpot only · Jun–Jul 2026</span></div>
          <div class="donut-wrap">
            <div class="donut-svg" aria-label="98.9% closed, 1.1% open" role="img">
              <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <circle cx="60" cy="60" r="46" fill="none" stroke="var(--pm-lt)" stroke-width="16"/>
                <circle cx="60" cy="60" r="46" fill="none" stroke="var(--green)" stroke-width="16" stroke-dasharray="285.9 289.03" stroke-dashoffset="72.26"/>
                <circle cx="60" cy="60" r="46" fill="none" stroke="var(--pm)" stroke-width="16" stroke-dasharray="3.2 289.03" stroke-dashoffset="-213.64"/>
                <circle cx="60" cy="60" r="46" fill="none" stroke="#fff" stroke-width="2.5" stroke-dasharray="0.5 288.53" stroke-dashoffset="72.26"/>
                <circle cx="60" cy="60" r="46" fill="none" stroke="#fff" stroke-width="2.5" stroke-dasharray="0.5 288.53" stroke-dashoffset="-213.64"/>
              </svg>
              <div class="donut-center"><div class="donut-num">5,940</div><div class="donut-lbl">total tickets</div></div>
            </div>
            <div style="flex:1">
              <div class="leg-item"><div class="leg-sw" style="background:var(--green)"></div><span class="leg-lbl">Closed</span><span class="leg-val">5,876 <span style="font-size:10px;color:var(--muted);font-weight:400">(98.9%)</span></span></div>
              <div class="leg-item"><div class="leg-sw" style="background:var(--pm)"></div><span class="leg-lbl">Open</span><span class="leg-val">64 <span style="font-size:10px;color:var(--muted);font-weight:400">(1.1%)</span></span></div>
              <div class="note-strip">Resolution rate: <strong style="color:var(--green)">98.9%</strong><br>HubSpot account 25864942<br>Data pulled Jul 3, 2026</div>
            </div>
          </div>
        </div>
        <div class="card" data-d="100">
          <div class="card-head"><span class="card-title">Email inbox</span></div>
          <div style="padding:12px 0;text-align:center">
            <div style="font-size:38px;font-weight:500;color:var(--amber);line-height:1;margin-bottom:8px">N/A</div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Connector reauth needed</div>
            <div style="font-size:11px;color:var(--mid);line-height:1.6;text-align:left;padding:10px 12px;background:var(--amber-lt);border-radius:var(--r)">
              &#9888; HubSpot email/conversation access requires reconnecting the integration. Until then, the 2 unassigned open tickets are the closest proxy for unclaimed inbound.
            </div>
